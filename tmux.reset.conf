# First remove *all* keybindings
# unbind-key -a
# Now reinsert all the regular tmux keys
bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind * list-clients

bind -r H previous-window
bind -r L next-window

# Cycle panes while zoomed
bind -r a select-pane -t .+1 \;  resize-pane -Z
bind b last-pane

bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf
bind ^B last-window
bind ^W list-windows
bind w list-windows
bind z resize-pane -Z
bind ^L refresh-client
bind l refresh-client
bind | split-window
bind t set -g status #{?status,off,on}
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind c kill-pane
bind x swap-pane -D
# bind S choose-session
bind K send-keys "clear"\; send-keys "Enter"
bind-key -T copy-mode-vi v send-keys -X begin-selection

bind-key -r M-Up swap-window -t -1\; select-window -t -1
bind-key -r M-Down swap-window -t +1\; select-window -t +1

# Toggle persistent floating Claude (prompts for a working directory first;
# one persistent session per directory, e.g. claude-Code-open_ims).
#
# Anti-nesting: from a normal session these open the floating popup; pressed while
# already *inside* a popup (session is claude-* or misc-shell) they reuse that same
# popup via switch-client instead of stacking another floating window on top. For
# Claude we park the popup in a throwaway "claude-picker" session that runs the same
# fzf and switch-clients to the choice (claude-popup.sh switch).
bind ^A if-shell -F '#{||:#{m:claude-*,#{session_name}},#{==:#{session_name},misc-shell}}' {
  new-session -d -A -s claude-picker -n claude "tmux set-option -t misc-shell status off; exec ~/.config/tmux/scripts/claude-popup.sh switch"
  switch-client -t claude-picker
} {
  display-popup -w 92% -h 92% -y 37% -b rounded -E "~/.config/tmux/scripts/claude-popup.sh"
}
bind ^S if-shell -F '#{||:#{m:claude-*,#{session_name}},#{==:#{session_name},misc-shell}}' {
  new-session -d -A -s misc-shell -n misc-shell "/bin/zsh -c 'tmux set-option -t misc-shell status off; fastfetch; exec zsh'"
  switch-client -t misc-shell
} {
  display-popup -w 92% -h 92% -y 37% -b rounded -E "tmux attach-session -t misc-shell || tmux new-session -s misc-shell -n misc-shell /bin/zsh -c 'tmux set-option -t misc-shell status off; fastfetch; exec zsh'"
}
